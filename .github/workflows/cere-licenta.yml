name: Procesare cerere de licență
on:
  issues:
    types: [opened]
jobs:
  procesare-licenta:
    if: contains(github.event.issue.labels.*.name, 'licență')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Redactare email și publicare răspuns
        uses: actions/github-script@v7
        env:
          LICENSE_API_URL: ${{ secrets.LICENSE_API_URL }}
          LICENSE_ADMIN_KEY: ${{ secrets.LICENSE_ADMIN_KEY }}
        with:
          script: |
            const body = context.payload.issue.body || '';
            const issueNumber = context.issue.number;
            const issueTitle = context.payload.issue.title;
            const issueAuthor = context.payload.issue.user.login;

            // ── Extragere email din formularul structurat ──
            const emailMatch = body.match(/### Adresa de email\s*\n\s*\n\s*([^\n]+)/);
            const email = emailMatch ? emailMatch[1].trim() : '';

            // ── Extragere integrare ──
            const integrareMatch = body.match(/### Integrarea vizată\s*\n\s*\n\s*([^\n]+)/);
            const integrare = integrareMatch ? integrareMatch[1].trim() : 'nespecificată';

            // ── Extragere tip cerere ──
            const tipMatch = body.match(/### Tipul cererii\s*\n\s*\n\s*([^\n]+)/);
            const tipCerere = tipMatch ? tipMatch[1].trim() : 'nespecificat';

            // ── Redactare email din body-ul issue-ului ──
            if (email && email.includes('@')) {
              const redacted = body.replace(
                email,
                '`[adresă redactată — transmisă confidențial dezvoltatorului]`'
              );
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: redacted
              });
              console.log('Email redactat din issue body');
            } else {
              console.log('Niciun email valid găsit în issue body');
            }

            // ── Salvare email în fișier pentru artifact ──
            const fs = require('fs');
            fs.mkdirSync('artifact', { recursive: true });
            fs.writeFileSync('artifact/email-info.txt', [
              `Issue:      #${issueNumber}`,
              `Titlu:      ${issueTitle}`,
              `Autor:      @${issueAuthor}`,
              `Integrare:  ${integrare}`,
              `Tip cerere: ${tipCerere}`,
              `Email:      ${email || 'N/A'}`,
              `Data:       ${new Date().toISOString()}`
            ].join('\n'));

            // ── Mascarea emailului din logurile workflow-ului ──
            if (email) core.setSecret(email);

            // ── Înregistrare cerere pe serverul de licențe ──
            if (email && email.includes('@')) {
              const apiUrl = process.env.LICENSE_API_URL;
              const adminKey = process.env.LICENSE_ADMIN_KEY;
              if (apiUrl && adminKey) {
                try {
                  const resp = await fetch(`${apiUrl}/license/v2/github/register-request`, {
                    method: 'POST',
                    headers: {
                      'Content-Type': 'application/json',
                      'X-Admin-Key': adminKey,
                    },
                    body: JSON.stringify({
                      repo: `${context.repo.owner}/${context.repo.repo}`,
                      issue_number: issueNumber,
                      github_user: issueAuthor,
                      email: email,
                      integration: integrare,
                      request_type: tipCerere,
                    }),
                  });
                  if (resp.ok) {
                    console.log('Cerere înregistrată pe serverul de licențe');
                  } else {
                    console.log(`Eroare înregistrare cerere: ${resp.status}`);
                  }
                } catch (e) {
                  console.log(`Nu s-a putut contacta serverul de licențe: ${e.message}`);
                }
              } else {
                console.log('LICENSE_API_URL sau LICENSE_ADMIN_KEY lipsesc din secrets');
              }
            }

            // ── Verificare promoție activă ──
            let promoActiv = false;
            const apiUrl = process.env.LICENSE_API_URL;
            const adminKey = process.env.LICENSE_ADMIN_KEY;
            if (apiUrl && adminKey) {
              try {
                const promoResp = await fetch(`${apiUrl}/license/v2/admin/bmac/promo-status`, {
                  headers: { 'X-Admin-Key': adminKey },
                });
                if (promoResp.ok) {
                  const promoData = await promoResp.json();
                  promoActiv = promoData.promo_activ === true;
                  console.log(`Promoție activă: ${promoActiv}`);
                }
              } catch (e) {
                console.log(`Nu s-a putut verifica promoția: ${e.message}`);
              }
            }

            // ── Comentariu automat — în funcție de promoție ──
            const integrari = [
              `- [E-Bloc România](https://github.com/cnecrea/e-bloc.ro)`,
              `- [E-ON România](https://github.com/cnecrea/eonromania)`,
              `- [eRovinieta](https://github.com/cnecrea/erovinieta)`,
              `- [Hidroelectrica](https://github.com/cnecrea/hidroelectrica)`,
              `- [MyElectrica](https://github.com/cnecrea/myelectrica)`,
              `- [Pago Plătește](https://github.com/cnecrea/pagoplateste)`,
              `- [Vehicule](https://github.com/cnecrea/vehicule)`,
            ].join('\n');

            let comment;

            if (promoActiv) {
              comment = [
                `Mulțumim pentru interes, @${issueAuthor}!`,
                ``,
                `Integrările Home Assistant sunt dezvoltate și întreținute constant — actualizări, compatibilitate cu noile versiuni, infrastructură, suport și documentație. Toate acestea necesită timp și efort continuu.`,
                ``,
                `Proiectul rămâne accesibil pentru toată lumea, însă dezvoltarea lui depinde de susținerea comunității.`,
                ``,
                `> 🎁 **Promoție activă!** Contribuie acum și primești automat licențe perpetue pentru **toate** integrările disponibile.`,
                ``,
                `---`,
                ``,
                `### Cum funcționează`,
                ``,
                `**Perioadă de test**`,
                `Fiecare integrare poate fi folosită gratuit timp de **30 de zile**, fără nicio limitare.`,
                ``,
                `**Susținerea proiectului**`,
                `Dacă integrarea îți este utilă și vrei să continue să fie dezvoltată, poți susține proiectul printr-o contribuție pe [Buy Me a Coffee](https://buymeacoffee.com/cnecrea).`,
                ``,
                `### Ce primești (promoție)`,
                ``,
                `O singură cafea = licențe **perpetue** (pe viață) pentru **toate** integrările:`,
                ``,
                integrari,
                ``,
                `---`,
                ``,
                `### Pași`,
                ``,
                `1. Accesează [Buy Me a Coffee](https://buymeacoffee.com/cnecrea) și oferă o cafea`,
                `2. **Introdu corect adresa de email** — pe aceasta vei primi licențele`,
                `3. Licențele se emit și se trimit automat pe email`,
                ``,
                `---`,
                ``,
                `### Informații utile`,
                ``,
                `- în cazul reinstalării Home Assistant, licențele pot fi reemise`,
                `- la restore din backup, licențele rămân active`,
                `- utilizatorii care au susținut anterior primesc licențele automat, fără solicitare suplimentară`,
                ``,
                `---`,
                `*Adresa de email a fost preluată și redactată automat din acest issue pentru confidențialitate.*`,
              ].join('\n');
            } else {
              comment = [
                `Mulțumim pentru interes, @${issueAuthor}!`,
                ``,
                `Integrările Home Assistant sunt dezvoltate și întreținute constant — actualizări, compatibilitate cu noile versiuni, infrastructură, suport și documentație. Toate acestea necesită timp și efort continuu.`,
                ``,
                `Proiectul rămâne accesibil pentru toată lumea, însă dezvoltarea lui depinde de susținerea comunității.`,
                ``,
                `---`,
                ``,
                `### Cum funcționează`,
                ``,
                `**Perioadă de test**`,
                `Fiecare integrare poate fi folosită gratuit timp de **30 de zile**, fără nicio limitare.`,
                ``,
                `**Susținerea proiectului**`,
                `Dacă integrarea îți este utilă și vrei să continue să fie dezvoltată, poți susține proiectul printr-o contribuție pe [Buy Me a Coffee](https://buymeacoffee.com/cnecrea).`,
                `Pentru fiecare cafea oferită primești **1 punct**.`,
                ``,
                `### Ce poți face cu punctele`,
                ``,
                `**1 punct = 1 licență perpetuă** (pe viață) pentru **oricare** dintre integrările de mai jos:`,
                ``,
                integrari,
                ``,
                `Vrei mai multe licențe? Oferi mai multe cafele — fiecare punct îți permite activarea unei licențe la alegere.`,
                ``,
                `---`,
                ``,
                `### Pași`,
                ``,
                `1. Accesează [Buy Me a Coffee](https://buymeacoffee.com/cnecrea) și oferă o cafea (sau mai multe)`,
                `2. **Introdu corect adresa de email** — pe aceasta vei primi link-ul de activare`,
                `3. Vei primi un email cu un **link personalizat** unde îți alegi integrările dorite`,
                `4. Licențele se generează instant pentru integrările alese`,
                ``,
                `---`,
                ``,
                `### Informații utile`,
                ``,
                `- în cazul reinstalării Home Assistant, licențele pot fi reemise`,
                `- la restore din backup, licențele rămân active`,
                `- punctele neutilizate rămân disponibile — poți reveni oricând să alegi integrări suplimentare`,
                `- utilizatorii care au susținut anterior primesc licențele automat, fără solicitare suplimentară`,
                ``,
                `---`,
                `*Adresa de email a fost preluată și redactată automat din acest issue pentru confidențialitate.*`,
              ].join('\n');
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });

            console.log('Comentariu publicat cu succes');

      - name: Upload email confidențial
        uses: actions/upload-artifact@v4
        with:
          name: licenta-email-${{ github.event.issue.number }}
          path: artifact/
          retention-days: 90
