name: Procesare cerere de licență
on:
  issues:
    types: [opened]
jobs:
  procesare-licenta:
    if: contains(github.event.issue.labels.*.name, 'licență')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Redactare email și publicare răspuns
        uses: actions/github-script@v7
        env:
          LICENSE_API_URL: ${{ secrets.LICENSE_API_URL }}
          LICENSE_ADMIN_KEY: ${{ secrets.LICENSE_ADMIN_KEY }}
        with:
          github-token: ${{ secrets.HUBINTELIGENT_PAT }}
          script: |
            const body = context.payload.issue.body || '';
            const issueNumber = context.issue.number;
            const issueTitle = context.payload.issue.title;
            const issueAuthor = context.payload.issue.user.login;

            // ── Extragere email din formularul structurat ──
            const emailMatch = body.match(/### Adresa de email\s*\n\s*\n\s*([^\n]+)/);
            const email = emailMatch ? emailMatch[1].trim() : '';

            // ── Extragere integrare ──
            const integrareMatch = body.match(/### Integrarea vizată\s*\n\s*\n\s*([^\n]+)/);
            const integrare = integrareMatch ? integrareMatch[1].trim() : 'nespecificată';

            // ── Extragere tip cerere ──
            const tipMatch = body.match(/### Tipul cererii\s*\n\s*\n\s*([^\n]+)/);
            const tipCerere = tipMatch ? tipMatch[1].trim() : 'nespecificat';

            // ── Redactare email din body-ul issue-ului ──
            if (email && email.includes('@')) {
              const redacted = body.replace(
                email,
                '`[adresă redactată — transmisă confidențial dezvoltatorului]`'
              );
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: redacted
              });
              console.log('Email redactat din issue body');
            } else {
              console.log('Niciun email valid găsit în issue body');
            }

            // ── Salvare email în fișier pentru artifact ──
            const fs = require('fs');
            fs.mkdirSync('artifact', { recursive: true });
            fs.writeFileSync('artifact/email-info.txt', [
              `Issue:      #${issueNumber}`,
              `Titlu:      ${issueTitle}`,
              `Autor:      @${issueAuthor}`,
              `Integrare:  ${integrare}`,
              `Tip cerere: ${tipCerere}`,
              `Email:      ${email || 'N/A'}`,
              `Data:       ${new Date().toISOString()}`
            ].join('\n'));

            // ── Mascarea emailului din logurile workflow-ului ──
            if (email) core.setSecret(email);

            // ── Înregistrare cerere pe serverul de licențe ──
            if (email && email.includes('@')) {
              const apiUrl = process.env.LICENSE_API_URL;
              const adminKey = process.env.LICENSE_ADMIN_KEY;
              if (apiUrl && adminKey) {
                try {
                  const resp = await fetch(`${apiUrl}/license/v2/github/register-request`, {
                    method: 'POST',
                    headers: {
                      'Content-Type': 'application/json',
                      'X-Admin-Key': adminKey,
                    },
                    body: JSON.stringify({
                      repo: `${context.repo.owner}/${context.repo.repo}`,
                      issue_number: issueNumber,
                      github_user: issueAuthor,
                      email: email,
                      integration: integrare,
                      request_type: tipCerere,
                    }),
                  });
                  if (resp.ok) {
                    console.log('Cerere înregistrată pe serverul de licențe');
                  } else {
                    console.log(`Eroare înregistrare cerere: ${resp.status}`);
                  }
                } catch (e) {
                  console.log(`Nu s-a putut contacta serverul de licențe: ${e.message}`);
                }
              } else {
                console.log('LICENSE_API_URL sau LICENSE_ADMIN_KEY lipsesc din secrets');
              }
            }

            // ── Verificare promoție activă ──
            let promoActiv = false;
            let promoEndDate = null;
            const apiUrl = process.env.LICENSE_API_URL;
            const adminKey = process.env.LICENSE_ADMIN_KEY;
            if (apiUrl && adminKey) {
              try {
                const promoResp = await fetch(`${apiUrl}/license/v2/admin/bmac/promo-status`, {
                  headers: { 'X-Admin-Key': adminKey },
                });
                if (promoResp.ok) {
                  const promoData = await promoResp.json();
                  promoActiv = promoData.promo_activ === true;
                  promoEndDate = promoData.end_date || null;
                  console.log(`Promoție activă: ${promoActiv}, end_date: ${promoEndDate}`);
                }
              } catch (e) {
                console.log(`Nu s-a putut verifica promoția: ${e.message}`);
              }
            }

            // Formatare dată promoție pentru afișare (ex: "1 mai 2026")
            function formatPromoDate(dateStr) {
              if (!dateStr) return null;
              const months = ['ianuarie','februarie','martie','aprilie','mai','iunie','iulie','august','septembrie','octombrie','noiembrie','decembrie'];
              const [y, m, d] = dateStr.split('-').map(Number);
              return `${d} ${months[m - 1]} ${y}`;
            }
            const promoDateText = formatPromoDate(promoEndDate);
            // Fără end_date valid = nu afișăm promoția (safety check)
            if (!promoDateText) promoActiv = false;
            const promoLine = `> 🎁 **Promoție până pe ${promoDateText}:** o singură contribuție oferă licențe permanente pentru **toate integrările**.`;

            // ── Comentariu automat — în funcție de promoție ──
            const integrari = `[E-bloc România](https://github.com/cnecrea/e-bloc.ro) · [E.ON România](https://github.com/cnecrea/eonromania) · [eRovinieta](https://github.com/cnecrea/erovinieta) · [Hidroelectrica](https://github.com/cnecrea/hidroelectrica) · [MyElectrica](https://github.com/cnecrea/myelectrica) · [MyENGIE](https://github.com/cnecrea/myengie) · [Nova Power & Gas](https://github.com/cnecrea/vreaulanova) · [OPCOM România](https://github.com/cnecrea/opcom) · [Pago Plătește](https://github.com/cnecrea/pagoplateste) · [Rețele Electrice](https://github.com/cnecrea/reteleelectrice) · [Vehicule](https://github.com/cnecrea/vehicule)`;

            let comment;

            if (promoActiv) {
              comment = [
                `Salut @${issueAuthor},`,
                ``,
                `Cererea ta a fost înregistrată. Integrările Home Assistant de pe Hub Inteligent pot fi testate gratuit 30 de zile. După această perioadă, ai nevoie de o licență — o obții printr-o contribuție pe [Buy Me a Coffee](https://buymeacoffee.com/cnecrea), echivalentul unei cafele.`,
                ``,
                promoLine,
                ``,
                `---`,
                ``,
                `### Cum funcționează`,
                ``,
                `Pe durata promoției, o singură contribuție oferă licențe permanente pentru toate integrările:`,
                ``,
                integrari,
                ``,
                `---`,
                ``,
                `### Cum primești licența`,
                ``,
                `1. Accesează [Buy Me a Coffee](https://buymeacoffee.com/cnecrea) și oferă o cafea`,
                `2. Folosește adresa de email corectă — pe ea vei primi licențele`,
                `3. Licențele se trimit automat pe email`,
                ``,
                `---`,
                ``,
                `### De reținut`,
                ``,
                `- la reinstalare, licențele se pot reemite`,
                `- la restore din backup, licențele rămân active`,
                `- dacă ai contribuit anterior, licențele se trimit automat`,
                ``,
                `---`,
                `*Adresa de email a fost preluată și redactată automat din acest issue.*`,
              ].join('\n');
            } else {
              comment = [
                `Salut @${issueAuthor},`,
                ``,
                `Cererea ta a fost înregistrată. Integrările Home Assistant de pe Hub Inteligent pot fi testate gratuit 30 de zile. După această perioadă, ai nevoie de o licență — o obții printr-o contribuție pe [Buy Me a Coffee](https://buymeacoffee.com/cnecrea), echivalentul unei cafele.`,
                ``,
                `---`,
                ``,
                `### Cum funcționează`,
                ``,
                `Fiecare cafea pe [Buy Me a Coffee](https://buymeacoffee.com/cnecrea) = **1 punct**. Cu 1 punct obții licența permanentă pentru o integrare la alegere.`,
                ``,
                `**Integrări disponibile:**`,
                ``,
                integrari,
                ``,
                `---`,
                ``,
                `### Cum primești licența`,
                ``,
                `1. Accesează [Buy Me a Coffee](https://buymeacoffee.com/cnecrea) și oferă o cafea (sau mai multe)`,
                `2. Folosește adresa de email corectă — fiecare cafea = **1 punct**`,
                `3. Primești un email cu un link unde alegi pentru ce integrare dorești licența`,
                ``,
                `---`,
                ``,
                `### De reținut`,
                ``,
                `- la reinstalare, licențele se pot reemite`,
                `- la restore din backup, licențele rămân active`,
                `- punctele rămân valabile`,
                `- dacă ai contribuit anterior, licențele se trimit automat`,
                ``,
                `---`,
                `*Adresa de email a fost preluată și redactată automat din acest issue.*`,
              ].join('\n');
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });

            console.log('Comentariu publicat cu succes');

      - name: Upload email confidențial
        uses: actions/upload-artifact@v4
        with:
          name: licenta-email-${{ github.event.issue.number }}
          path: artifact/
          retention-days: 90
