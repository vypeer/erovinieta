name: Licențiere
description: Cereri de licență nouă, probleme de activare sau erori de validare a licenței.
title: "[LICENȚĂ] "
labels:
  - licență
body:
  - type: markdown
    attributes:
      value: |
        Completați formularul de mai jos în funcție de situația dvs.:
        - **Licență nouă** — doriți să susțineți proiectul și să primiți o licență
        - **Problemă de activare** — ați primit licența, dar nu se activează
        - **Eroare de validare** — integrarea afișează erori legate de licență

        > **Confidențialitate:** adresa de email introdusă mai jos va fi redactată automat din această pagină în câteva secunde după trimitere și va fi transmisă confidențial doar dezvoltatorului.

  - type: dropdown
    id: tip_cerere
    attributes:
      label: Tipul cererii
      description: Selectați ce tip de solicitare aveți.
      options:
        - Licență nouă
        - Problemă de activare
        - Eroare de validare a licenței
    validations:
      required: true

  - type: dropdown
    id: integrare
    attributes:
      label: Integrarea vizată
      description: Pentru care integrare solicitați licența sau raportați problema?
      options:
        - CNAIR eRovinieta
    validations:
      required: true

  - type: input
    id: email
    attributes:
      label: Adresa de email
      description: |
        Adresa pe care doriți să primiți licența. Va fi redactată automat din issue pentru confidențialitate.
      placeholder: "exemplu@email.com"
    validations:
      required: true

  - type: input
    id: cheie_licenta
    attributes:
      label: Cheia de licență (dacă aveți una)
      description: Completați doar dacă aveți deja o cheie și raportați o problemă de activare sau validare.
      placeholder: "Exemplu: EROV-A3F2-9B1C-E7D4-52A8"
    validations:
      required: false

  - type: textarea
    id: descriere
    attributes:
      label: Descrierea situației
      description: |
        - Pentru licență nouă: menționați dacă ați efectuat contribuția prin Buy Me a Coffee.
        - Pentru probleme: descrieți eroarea, ce ați încercat și ce mesaj afișează integrarea.
      placeholder: "Descrieți situația dvs. aici..."
    validations:
      required: true
